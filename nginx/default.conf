# ============================================================
# Nginx Reverse Proxy Configuration (for advanced users)
# ============================================================
# This file is OPTIONAL. You only need it if you want to:
#   - Use domain names instead of IP:port (e.g., brainstorming-buddy.yourdomain.com)
#   - Run multiple apps on the same server using different subdomains
#   - Add HTTPS/SSL encryption
#
# How to use:
#   1. Install Nginx on your server: sudo apt install nginx
#   2. Copy this file to: /etc/nginx/sites-available/brainstorming-buddy
#   3. Edit the domain names below to match your actual domains
#   4. Create a symlink: sudo ln -s /etc/nginx/sites-available/brainstorming-buddy /etc/nginx/sites-enabled/
#   5. Test config: sudo nginx -t
#   6. Reload: sudo nginx -s reload
#
# For HTTPS, use Certbot (Let's Encrypt) after step 4:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d brainstorming-buddy.yourdomain.com
# ============================================================

# ===== My Brainstorming Buddy — Main App =====
server {
    # Listen on port 80 (HTTP)
    listen 80;
    listen [::]:80;

    # 👇 CHANGE THIS to your actual domain name
    server_name brainstorming-buddy.yourdomain.com;

    # Optional: Uncomment to redirect HTTP to HTTPS after setting up Certbot
    # return 301 https://$host$request_uri;

    # Streamlit needs WebSocket support for real-time updates
    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running analyses
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Streamlit health endpoint
    location /_stcore/health {
        proxy_pass http://127.0.0.1:8501/_stcore/health;
        access_log off;
    }
}

